<!DOCTYPE html>

<html lang="tr" style="background:#0d0d1a">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">BizPanel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* fonts loaded async */
:root{
  --bg:#0d0d1a;--bg2:#181828;--bg3:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.09);--text:#fff;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.3);
  --acc1:#f97316;--acc2:#ef4444;
  --green:#10b981;--blue:#06b6d4;--purple:#8b5cf6;--yellow:#f59e0b;--pink:#ec4899;
}
html,body{margin:0;padding:0;background:var(--bg)!important;color:var(--text)!important;font-family:system-ui,-apple-system,'DM Sans',sans-serif;min-height:100vh}
*{box-sizing:border-box}
#app{background:var(--bg);min-height:100vh;color:var(--text)}
input,select,textarea,button{font-family:system-ui,-apple-system,sans-serif}
input,select,textarea{background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.18)!important;color:#fff!important;border-radius:10px;padding:10px 14px;width:100%;outline:none;font-size:14px}
input:focus,select:focus,textarea:focus{border-color:rgba(249,115,22,0.6)!important;background:rgba(255,255,255,0.11)!important}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.35)!important}
select option{background:#1e1e35!important;color:#fff!important}
textarea{resize:vertical;min-height:80px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.5);border-radius:3px}

/* BUTTONS */
.bp{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff;border:none;padding:11px 22px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:opacity .2s}
.bp:hover{opacity:.82}
.bs{background:rgba(255,255,255,0.09);color:#ccc;border:1px solid rgba(255,255,255,0.14);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;color:#ccc}
.bs:hover{background:rgba(255,255,255,0.14)}
.bd{background:rgba(239,68,68,0.16);color:#ef4444;border:1px solid rgba(239,68,68,0.32);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.bd:hover{background:rgba(239,68,68,0.28)}
.be{background:rgba(6,182,212,0.16);color:#06b6d4;border:1px solid rgba(6,182,212,0.32);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;margin-right:6px;transition:all .2s}
.be:hover{background:rgba(6,182,212,0.28)}

/* LAYOUT */
.header{background:rgba(255,255,255,0.03);border-bottom:1px solid var(–border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px)}
.logo-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.logo-ico{width:34px;height:34px;background:linear-gradient(135deg,var(–acc1),var(–acc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-txt{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(–acc1),var(–acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.hbtns{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.tab-bar{display:flex;gap:2px;padding:14px 20px 0;overflow-x:auto;border-bottom:1px solid var(–border);background:var(–bg)}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:9px 18px;border:none;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap;border-radius:9px 9px 0 0;transition:all .2s;font-family:system-ui,-apple-system,sans-serif;background:transparent;color:rgba(255,255,255,0.45)}
.tab.on{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff}
.tab:not(.on):hover{background:rgba(249,115,22,0.12);color:rgba(255,255,255,0.75)}
.wrap{padding:22px 20px;max-width:1200px;margin:0 auto}
.panel{background:var(–bg3);border:1px solid var(–border);border-radius:18px}
.card-stat{background:rgba(255,255,255,0.04);border-radius:18px;padding:20px 22px;position:relative;overflow:hidden}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px}
.g6{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:13px 18px;text-align:left;font-size:12px;color:rgba(255,255,255,0.45);font-weight:600;background:rgba(255,255,255,0.05);white-space:nowrap}
.tbl td{padding:11px 18px;border-top:1px solid rgba(255,255,255,0.055);font-size:14px;color:#e2e2e2;vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(255,255,255,0.025)}
.sec-title{font-size:20px;font-weight:800;margin-bottom:18px;color:#fff}
.lbl{color:rgba(255,255,255,0.5);font-size:13px;font-weight:600;margin-bottom:12px}
.empty{padding:32px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px}
.badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:rgba(249,115,22,0.15);color:#f97316}
.tag{background:rgba(249,115,22,0.1);color:#f97316;border:1px solid rgba(249,115,22,0.25);border-radius:7px;padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:6px}
.search-bar{position:relative;margin-bottom:18px}
.search-bar input{padding-left:40px!important}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);font-size:16px;pointer-events:none}
.trend-up{color:#10b981;font-size:12px;font-weight:700}
.trend-dn{color:#ef4444;font-size:12px;font-weight:700}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:#181828;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:30px;width:100%;max-width:500px;box-shadow:0 28px 80px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto}
.mbox input,.mbox select,.mbox textarea{margin-bottom:12px}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mhead h3{color:#fff;font-size:17px;font-weight:700;margin:0}
.mclose{background:rgba(255,255,255,0.1);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px}

/* TOAST */
.toast{position:fixed;top:22px;right:22px;z-index:9999;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.45);animation:slin .3s ease;pointer-events:none}
@keyframes slin{from{transform:translateX(70px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fup{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade{animation:fup .3s ease}
.day-grp{background:rgba(255,255,255,0.03);border:1px solid var(–border);border-radius:16px;margin-bottom:14px;overflow:hidden}
.day-head{background:rgba(16,185,129,0.09);border-bottom:1px solid rgba(255,255,255,0.07);padding:11px 18px;display:flex;justify-content:space-between;align-items:center}

/* LOGIN */
.login-wrap{min-height:100vh;background:var(–bg);display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,0.13) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(239,68,68,0.08) 0%,transparent 50%)}
.login-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:22px;padding:44px 38px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,0.55)}
.login-box input{margin-bottom:12px}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;gap:10px;max-height:380px;overflow-y:auto;padding:4px}
.msg{display:flex;flex-direction:column;max-width:80%}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.msg.mine .msg-bubble{background:linear-gradient(135deg,rgba(249,115,22,0.4),rgba(239,68,68,0.4));border:1px solid rgba(249,115,22,0.3);color:#fff}
.msg.theirs .msg-bubble{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#e2e2e2}
.msg-meta{font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;padding:0 4px}
.unread-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block;margin-left:4px}

/* DASHBOARD */
.dash-kpi{background:rgba(255,255,255,0.04);border-radius:16px;padding:18px 20px;border:1px solid var(–border);position:relative;overflow:hidden;transition:transform .2s}
.dash-kpi:hover{transform:translateY(-2px)}
.comp-up{color:#10b981;background:rgba(16,185,129,0.12);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700}
.comp-dn{color:#ef4444;background:rgba(239,68,68,0.12);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700}
.comp-eq{color:#f59e0b;background:rgba(245,158,11,0.12);border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700}

/* THEME PICKER */
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.color-swatch.active,.color-swatch:hover{border-color:#fff;transform:scale(1.15)}

@media(max-width:768px){
.wrap{padding:14px 12px}
.mbox{padding:22px 16px}
.tbl td,.tbl th{padding:9px 11px;font-size:13px}
.be,.bd{padding:5px 9px;font-size:11px}
.tab{padding:8px 12px;font-size:12px}
.login-box{padding:32px 22px}
.hbtns .bs{padding:6px 10px;font-size:12px}
}
</style>

</head>
<body>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<script>
window.onerror = function(msg, src, line, col, err) {
  var app = document.getElementById('app');
  if(app && app.innerHTML.length < 50) {
    app.innerHTML = '<div style="color:#f97316;padding:40px;font-family:sans-serif"><h2>Hata olustu</h2><p>' + msg + '</p><p>Satir: ' + line + '</p></div>';
  }
  return false;
};
</script>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const ADMIN_USER='admin';
const COLS=['#f97316','#06b6d4','#8b5cf6','#10b981','#f59e0b','#ef4444','#ec4899'];
const THEME_PRESETS=[
  {name:'Turuncu',a:'#f97316',b:'#ef4444'},
  {name:'Mavi',a:'#3b82f6',b:'#06b6d4'},
  {name:'Yeşil',a:'#10b981',b:'#059669'},
  {name:'Mor',a:'#8b5cf6',b:'#ec4899'},
  {name:'Altın',a:'#f59e0b',b:'#f97316'},
];

let DB, AUTH=null, TAB=‘dashboard’;
let ADMIN_PWD = localStorage.getItem(‘biz_admin_pwd’)||‘admin123’;

function freshDB(){
return{personnel:[],timesheet:[],income:[],expenses:[],cats:[‘Kira’,‘Fatura’,‘Malzeme’,‘Personel’,‘Diğer’],messages:[],settings:{bizName:‘BizPanel’,themeA:’#f97316’,themeB:’#ef4444’,logo:‘⚡’}};
}
function initDB(){try{const d=JSON.parse(localStorage.getItem(‘biz4’));return d?{…freshDB(),…d,settings:{…freshDB().settings,…(d.settings||{})}}:freshDB();}catch{return freshDB();}}
function save(){try{localStorage.setItem(‘biz4’,JSON.stringify(DB));}catch{}}
DB=initDB();

function applyTheme(){
document.documentElement.style.setProperty(’–acc1’,DB.settings.themeA);
document.documentElement.style.setProperty(’–acc2’,DB.settings.themeB);
document.getElementById(‘page-title’).textContent=DB.settings.bizName||‘BizPanel’;
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function $(id){return document.getElementById(id)}
function val(id){return $(id)?$(id).value.trim():’’}
function toast(msg,t=‘ok’){
const d=document.createElement(‘div’);d.className=‘toast’;
d.style.background=t===‘ok’?‘linear-gradient(135deg,#10b981,#059669)’:‘linear-gradient(135deg,#ef4444,#dc2626)’;
d.textContent=(t===‘ok’?’✓ ’:’✗ ’)+msg;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);
}
function openModal(html,bind){
closeModal();
const bg=document.createElement(‘div’);bg.className=‘mbg’;bg.id=‘mbg’;
bg.innerHTML=`<div class="mbox">${html}</div>`;
bg.addEventListener(‘click’,e=>{if(e.target===bg)closeModal();});
document.body.appendChild(bg);if(bind)bind();
}
function closeModal(){const m=$(‘mbg’);if(m)m.remove();}

function thisMonth(){return new Date().toISOString().slice(0,7);}
function lastMonth(){const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}
function monthIncome(m){return DB.income.filter(i=>i.date?.startsWith(m)).reduce((s,i)=>s+Number(i.cash||0)+Number(i.card||0),0);}
function monthExpense(m){return DB.expenses.filter(e=>e.date?.startsWith(m)).reduce((s,e)=>s+Number(e.amount||0),0);}
function monthWages(m){return DB.timesheet.filter(t=>t.date?.startsWith(m)).reduce((s,t)=>{const p=DB.personnel.find(x=>x.id===t.pid);return s+(p?Number(t.hours)*Number(p.rate):0);},0);}
function pct(a,b){if(b===0)return a>0?100:0;return Math.round((a-b)/b*100);}
function compBadge(cur,prev){const p=pct(cur,prev);if(p>0)return`<span class="comp-up">▲ %${p}</span>`;if(p<0)return`<span class="comp-dn">▼ %${Math.abs(p)}</span>`;return`<span class="comp-eq">- %0</span>`;}
function unreadCount(uid){return DB.messages.filter(m=>m.to===uid&&!m.read).length;}

function render(){
applyTheme();
const app=$(‘app’);
if(!AUTH){app.innerHTML=loginView();bindLogin();return;}
if(AUTH.role===‘staff’){app.innerHTML=staffView();bindStaff();return;}
app.innerHTML=adminShell();bindShell();showTab(TAB);
}

// ═══════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════
function loginView(){
const n=DB.settings.bizName||‘BizPanel’;
const ico=DB.settings.logo||‘⚡’;
return`<div class="login-wrap">

  <div class="login-box">
    <div style="text-align:center;margin-bottom:30px">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,${DB.settings.themeA},${DB.settings.themeB});border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px">${ico}</div>
      <div style="font-size:24px;font-weight:800;background:linear-gradient(135deg,${DB.settings.themeA},${DB.settings.themeB});-webkit-background-clip:text;-webkit-text-fill-color:transparent">${n}</div>
      <p style="color:rgba(255,255,255,0.38);font-size:13px;margin:4px 0 0">İşletme Yönetim Sistemi</p>
    </div>
    <input id="lu" placeholder="Kullanıcı Adı" autocomplete="username"/>
    <input id="lp" type="password" placeholder="Şifre" autocomplete="current-password"/>
    <p id="le" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;margin:4px 0 10px"></p>
    <button class="bp" id="lgbtn" style="width:100%;padding:13px;font-size:15px;border-radius:12px">Giriş Yap →</button>
    <p style="color:rgba(255,255,255,0.22);font-size:11px;text-align:center;margin-top:16px">Admin: admin / ${ADMIN_PWD}</p>
  </div></div>`;
}
function bindLogin(){
  const go=()=>{
    const u=val('lu'),p=$('lp').value;
    if(u===ADMIN_USER&&p===ADMIN_PWD){AUTH={role:'admin'};render();return;}
    const x=DB.personnel.find(q=>q.username===u&&q.password===p);
    if(x){AUTH={role:'staff',id:x.id};render();return;}
    $('le').textContent='Kullanıcı adı veya şifre hatalı!';
  };
  $('lgbtn').onclick=go;
  $('lp').onkeydown=e=>{if(e.key==='Enter')go();};
  $('lu').onkeydown=e=>{if(e.key==='Enter')go();};
}

// ═══════════════════════════════════════════════
//  STAFF VIEW
// ═══════════════════════════════════════════════
function staffView(){
const p=DB.personnel.find(x=>x.id===AUTH.id);
if(!p)return`<div style="padding:60px;text-align:center;color:#fff">Personel bulunamadı.</div>`;
const sh=[…DB.timesheet.filter(t=>t.pid===p.id)].sort((a,b)=>new Date(b.date)-new Date(a.date));
const tH=sh.reduce((s,t)=>s+Number(t.hours),0);
const myMsgs=DB.messages.filter(m=>m.to===p.id||m.from===p.id);
const unread=DB.messages.filter(m=>m.to===p.id&&!m.read).length;
const rows=sh.length===0?`<tr><td colspan="3" class="empty">Henüz kayıt yok</td></tr>`:
sh.map(s=>`<tr><td>${s.date}</td><td style="color:#06b6d4;font-weight:700">${s.hours} sa</td><td style="color:#10b981;font-weight:700">₺${(Number(s.hours)*Number(p.rate)).toLocaleString('tr')}</td></tr>`).join(’’);

const msgHtml=myMsgs.length===0?’<div class="empty">Henüz mesaj yok</div>’:
myMsgs.sort((a,b)=>a.ts-b.ts).map(m=>{
const mine=m.from===p.id;
return`<div class="msg ${mine?'mine':'theirs'}"> <div class="msg-bubble">${m.text}</div> <div class="msg-meta">${mine?'Siz':'Yönetici'} • ${new Date(m.ts).toLocaleString('tr')}</div> </div>`;
}).join(’’);

return`<div class="header" style="background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.08);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px)">
<div class="logo-wrap">
<div class="logo-ico" style="background:linear-gradient(135deg,${DB.settings.themeA},${DB.settings.themeB})">${DB.settings.logo||‘⚡’}</div>
<span class="logo-txt" style="background:linear-gradient(135deg,${DB.settings.themeA},${DB.settings.themeB});-webkit-background-clip:text;-webkit-text-fill-color:transparent">${DB.settings.bizName||‘BizPanel’}</span>
</div>
<div style="display:flex;align-items:center;gap:10px">
<span style="color:rgba(255,255,255,0.5);font-size:13px">👋 ${p.firstName} ${p.lastName}</span>
<button class="bs" id="lout">Çıkış</button>
</div>

  </div>
  <div class="wrap fade">
    <h2 class="sec-title">Çalışma Özetim</h2>
    <div class="g3" style="margin-bottom:26px">
      ${sc('📅','Toplam Vardiya',sh.length,'','#06b6d4')}
      ${sc('⏱️','Toplam Saat',tH+' sa','','#8b5cf6')}
      ${sc('💵','Toplam Kazanç','₺'+(tH*Number(p.rate)).toLocaleString('tr'),'','#10b981')}
    </div>
    <div class="panel" style="overflow:hidden;margin-bottom:24px">
      <table class="tbl"><thead><tr><th>Tarih</th><th>Çalışma Saati</th><th>Günlük Kazanç</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    <div class="panel" style="padding:22px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <p style="font-weight:700;font-size:15px;margin:0">💬 Yönetici ile Mesajlaşma ${unread>0?`<span class="unread-dot"></span>`:''}</p>
      </div>
      <div class="chat-wrap" id="staff-chat">${msgHtml}</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input id="staff-msg-inp" placeholder="Mesajınızı yazın..." style="flex:1"/>
        <button class="bp" style="padding:10px 18px;flex-shrink:0" id="staff-send">Gönder</button>
      </div>
    </div>
  </div>`;
}
function bindStaff(){
  $('lout').onclick=()=>{AUTH=null;render();};
  const p=DB.personnel.find(x=>x.id===AUTH.id);
  // mark as read
  DB.messages.forEach(m=>{if(m.to===p.id)m.read=true;});save();
  const sc2=$('staff-chat');if(sc2)sc2.scrollTop=sc2.scrollHeight;
  $('staff-send').onclick=()=>{
    const txt=val('staff-msg-inp');if(!txt)return;
    DB.messages.push({id:Date.now()+'',from:p.id,to:'admin',text:txt,ts:Date.now(),read:false});

function miniCard(icon,label,value,color){
  return`<div style="background:rgba(255,255,255,0.03);border:1px solid ${color}22;border-radius:14px;padding:14px 16px">

function filterTable(data,q,fields){
  if(!q)return data;
  const ql=q.toLowerCase();
  return data.filter(r=>fields.some(f=>String(r[f]||'').toLowerCase().includes(ql)));
}

function bindSettings(){
  // İşletme adı
  $('save-biz').onclick=()=>{
    DB.settings.bizName=val('st-name')||'BizPanel';
    DB.settings.logo=val('st-logo')||'⚡';
    save();applyTheme();toast('İşletme bilgileri kaydedildi!');showTab('settings');
  };
  // Tema
  document.querySelectorAll('.color-swatch').forEach(sw=>{
    sw.onclick=()=>{
      const t=THEME_PRESETS[sw.dataset.i];
      $('st-c1').value=t.a;$('st-c2').value=t.b;
      $('theme-preview').style.background=`linear-gradient(135deg,${t.a},${t.b})`;
    };
  });
  ['st-c1','st-c2'].forEach(id=>{$(id).oninput=()=>{
    $('theme-preview').style.background=`linear-gradient(135deg,${$('st-c1').value},${$('st-c2').value})`;
  };});
  $('save-theme').onclick=()=>{
    DB.settings.themeA=$('st-c1').value;DB.settings.themeB=$('st-c2').value;
    save();applyTheme();toast('Tema uygulandı!');showTab('settings');
  };
  // Şifre
  $('pwsv').onclick=()=>{
    const cur=$('pw0').value,n1=$('pw1').value,n2=$('pw2').value;
    if(cur!==ADMIN_PWD){$('pwerr').textContent='Mevcut şifre yanlış!';return;}
    if(n1.length<4){$('pwerr').textContent='En az 4 karakter!';return;}
    if(n1!==n2){$('pwerr').textContent='Şifreler eşleşmiyor!';return;}
    ADMIN_PWD=n1;localStorage.setItem('biz_admin_pwd',ADMIN_PWD);toast('Şifre güncellendi!');showTab('settings');
  };
  // Export
  $('export-btn').onclick=()=>{
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`BizPanel_Yedek_${new Date().toLocaleDateString('tr').replace(/\./g,'-')}.json`;a.click();toast('Veri dışa aktarıldı!');
  };
  $('import-btn').onclick=()=>$('import-file').click();
  $('import-file').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{DB={...freshDB(),...JSON.parse(ev.target.result)};save();applyTheme();toast('Veri içe aktarıldı!');showTab('settings');}catch{toast('Geçersiz dosya!','err');}};r.readAsText(f);
  };
  $('reset-btn').onclick=()=>{
    if(confirm('Tüm veriler silinecek! Emin misiniz?')){DB=freshDB();save();toast('Sıfırlandı!');showTab('settings');}
  };
}

function downloadPDF(){
const{jsPDF}=window.jspdf;if(!jsPDF){toast(‘PDF yüklenemedi!’,‘err’);return;}
const doc=new jsPDF({orientation:‘portrait’,unit:‘mm’,format:‘a4’});
const today=new Date().toLocaleDateString(‘tr-TR’);
const pw=doc.internal.pageSize.getWidth();
function band(title,y,r,g,b){doc.setFillColor(r,g,b);doc.roundedRect(14,y,pw-28,9,2,2,‘F’);doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont(‘helvetica’,‘bold’);doc.text(title,18,y+6.2);doc.setTextColor(30,30,50);return y+14;}
doc.setFillColor(13,13,26);doc.rect(0,0,pw,297,‘F’);
doc.setFillColor(249,115,22);doc.roundedRect(14,20,pw-28,50,6,6,‘F’);
doc.setTextColor(255,255,255);doc.setFontSize(26);doc.setFont(‘helvetica’,‘bold’);doc.text(DB.settings.bizName||‘BizPanel’,pw/2,48,{align:‘center’});
doc.setFontSize(13);doc.setFont(‘helvetica’,‘normal’);doc.text(‘İşletme Yönetim Raporu’,pw/2,58,{align:‘center’});
doc.setFontSize(10);doc.text(‘Rapor Tarihi: ‘+today,pw/2,66,{align:‘center’});
const tI=DB.income.reduce((s,i)=>s+Number(i.cash||0)+Number(i.card||0),0);
const tE=DB.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
const tW=DB.timesheet.reduce((s,t)=>{const p=DB.personnel.find(x=>x.id===t.pid);return s+(p?Number(t.hours)*Number(p.rate):0);},0);
const net=tI-tE-tW;
const cards=[{l:‘Toplam Gelir’,v:‘₺’+tI.toLocaleString(‘tr’),r:16,g:185,b:129},{l:‘Toplam Gider’,v:‘₺’+tE.toLocaleString(‘tr’),r:239,g:68,b:68},{l:‘Personel Masrafı’,v:‘₺’+tW.toLocaleString(‘tr’),r:139,g:92,b:246},{l:‘Net Kâr’,v:‘₺’+net.toLocaleString(‘tr’),r:net>=0?16:239,g:net>=0?185:68,b:net>=0?129:68}];
let cx=14,cy=82;const cw=(pw-28-9)/4;
cards.forEach(c=>{doc.setFillColor(c.r,c.g,c.b);doc.roundedRect(cx,cy,cw,22,3,3,‘F’);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont(‘helvetica’,‘normal’);doc.text(c.l,cx+cw/2,cy+7,{align:‘center’});doc.setFontSize(10);doc.setFont(‘helvetica’,‘bold’);doc.text(c.v,cx+cw/2,cy+16,{align:‘center’});cx+=cw+3;});
cy+=30;doc.setTextColor(180,180,180);doc.setFontSize(8);doc.setFont(‘helvetica’,‘normal’);doc.text(`Personel: ${DB.personnel.length}  |  Vardiya: ${DB.timesheet.length}  |  Gelir Kaydı: ${DB.income.length}  |  Gider Kaydı: ${DB.expenses.length}`,14,cy);cy+=10;
const ts={fillColor:[24,24,40],textColor:[220,220,220],fontSize:9,cellPadding:3};const hs={textColor:[255,255,255],fontStyle:‘bold’};const as={fillColor:[30,30,50]};const tl={tableLineColor:[60,60,80],tableLineWidth:0.2};
cy=band(‘👥 Personel Çalışma Detayı’,cy,139,92,246);
doc.autoTable({startY:cy,margin:{left:14,right:14},head:[[‘Ad Soyad’,‘Vardiya’,‘Toplam Saat’,‘Ücret’,‘Toplam Kazanç’]],body:DB.personnel.map(p=>{const sh=DB.timesheet.filter(t=>t.pid===p.id);const tH=sh.reduce((s,t)=>s+Number(t.hours),0);return[p.firstName+’ ‘+p.lastName,sh.length+’’,tH+’ sa’,‘₺’+p.rate+’/sa’,‘₺’+(tH*Number(p.rate)).toLocaleString(‘tr’)];})||[[‘Kayıt yok’,’’,’’,’’,’’]],styles:ts,headStyles:{…hs,fillColor:[80,50,180]},alternateRowStyles:as,…tl});cy=doc.lastAutoTable.finalY+8;
if(cy>240){doc.addPage();doc.setFillColor(13,13,26);doc.rect(0,0,pw,297,‘F’);cy=14;}
cy=band(‘💰 Gelir Kayıtları’,cy,16,185,129);
doc.autoTable({startY:cy,margin:{left:14,right:14},head:[[‘Tarih’,‘Nakit’,‘Kredi Kartı’,‘Toplam’]],body:[…DB.income].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(i=>[i.date,‘₺’+Number(i.cash||0).toLocaleString(‘tr’),‘₺’+Number(i.card||0).toLocaleString(‘tr’),‘₺’+(Number(i.cash||0)+Number(i.card||0)).toLocaleString(‘tr’)])||[[‘Kayıt yok’,’’,’’,’’]],styles:ts,headStyles:{…hs,fillColor:[14,120,90]},alternateRowStyles:as,…tl});cy=doc.lastAutoTable.finalY+8;
if(cy>240){doc.addPage();doc.setFillColor(13,13,26);doc.rect(0,0,pw,297,‘F’);cy=14;}
cy=band(‘📉 Gider Kayıtları’,cy,239,68,68);
doc.autoTable({startY:cy,margin:{left:14,right:14},head:[[‘Tarih’,‘Kategori’,‘Tutar’]],body:[…DB.expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>[e.date,e.cat,‘₺’+Number(e.amount).toLocaleString(‘tr’)])||[[‘Kayıt yok’,’’,’’]],styles:ts,headStyles:{…hs,fillColor:[160,40,40]},alternateRowStyles:as,…tl});
const pages=doc.internal.getNumberOfPages();
for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFillColor(13,13,26);doc.rect(0,287,pw,10,‘F’);doc.setTextColor(100,100,120);doc.setFontSize(7);doc.text(`${DB.settings.bizName||'BizPanel'} Raporu - ${today}`,14,293);doc.text(`Sayfa ${i}/${pages}`,pw-14,293,{align:‘right’});}
doc.save(`${(DB.settings.bizName||'BizPanel').replace(/\s/g,'_')}_Rapor_${today.replace(/\./g,'-')}.pdf`);
toast(‘PDF rapor indirildi!’);
}
