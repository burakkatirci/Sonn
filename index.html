<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title id="page-title">BizPanel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0d0d1a; --bg3:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.09);
  --acc1:#f97316; --acc2:#ef4444;
  --bnav-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
html,body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
#app{background:var(--bg);min-height:100vh}
input,select,textarea,button{font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none}
input,select,textarea{
  background:rgba(255,255,255,0.08)!important;
  border:1px solid rgba(255,255,255,0.18)!important;
  color:#fff!important;border-radius:10px;padding:10px 14px;
  width:100%;outline:none;font-size:16px;display:block;margin-bottom:10px
}
input:focus,select:focus,textarea:focus{border-color:rgba(249,115,22,.6)!important;background:rgba(255,255,255,.11)!important}
input[type="checkbox"]{width:18px;height:18px;flex-shrink:0;cursor:pointer}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.35)!important}
select option{background:#1e1e35;color:#fff}
textarea{resize:vertical;min-height:80px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,.4);border-radius:3px}

/* ── BUTTONS ────────────────────────────────────────── */
.bp{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff;border:none;padding:12px 22px;border-radius:12px;cursor:pointer;font-weight:700;font-size:15px;transition:opacity .2s;display:inline-block;min-height:44px}
.bp:hover{opacity:.82} .bp:active{opacity:.7;transform:scale(.98)}
.bp.full{width:100%;padding:13px}
.bs{background:rgba(255,255,255,.09);color:#ccc;border:1px solid rgba(255,255,255,.14);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;transition:all .2s;min-height:36px}
.bs:hover{background:rgba(255,255,255,.15)}
.bd{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;min-height:34px}
.bd:hover{background:rgba(239,68,68,.28)}
.be{background:rgba(6,182,212,.15);color:#06b6d4;border:1px solid rgba(6,182,212,.3);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;margin-right:6px;transition:all .2s;min-height:34px}
.be:hover{background:rgba(6,182,212,.28)}

/* ── HEADER ─────────────────────────────────────────── */
.header{background:rgba(13,13,26,.97);border-bottom:1px solid var(–border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:300;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.logo-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.logo-ico{width:34px;height:34px;background:linear-gradient(135deg,var(–acc1),var(–acc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-txt{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(–acc1),var(–acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.hbtns{display:flex;align-items:center;gap:6px}

/* ── DESKTOP TABS ────────────────────────────────────── */
.tab-bar{display:flex;gap:2px;padding:12px 20px 0;overflow-x:auto;border-bottom:1px solid var(–border);background:var(–bg);scrollbar-width:none}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:9px 14px;border:none;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap;border-radius:9px 9px 0 0;transition:all .2s;font-family:‘DM Sans’,sans-serif;background:transparent;color:rgba(255,255,255,.45);min-height:40px}
.tab.on{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff}
.tab:hover:not(.on){background:rgba(249,115,22,.12);color:rgba(255,255,255,.75)}

/* ── MOBILE BOTTOM NAV ───────────────────────────────── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,26,.97);border-top:1px solid var(–border);z-index:300;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom)}
.bnav-inner{display:flex;height:var(–bnav-h);overflow-x:auto;scrollbar-width:none}
.bnav-inner::-webkit-scrollbar{height:0}
.bnav-btn{flex:0 0 auto;min-width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.38);font-size:10px;font-weight:600;font-family:‘DM Sans’,sans-serif;padding:6px 8px;transition:color .15s;position:relative}
.bnav-btn.on{color:var(–acc1)}
.bnav-icon{font-size:20px;line-height:1}
.bnav-dot{position:absolute;top:8px;right:calc(50% - 17px);width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #0d0d1a}

/* ── LAYOUT ──────────────────────────────────────────── */
.wrap{padding:16px;max-width:1200px;margin:0 auto}
.panel{background:var(–bg3);border:1px solid var(–border);border-radius:16px;padding:18px;margin-bottom:16px}
.card{background:rgba(255,255,255,.04);border-radius:14px;padding:14px 16px;border:1px solid rgba(255,255,255,.07)}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:14px}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.tbl-wrap{border:1px solid var(–border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;min-width:420px}
.tbl th{padding:10px 14px;text-align:left;font-size:12px;color:rgba(255,255,255,.45);font-weight:600;background:rgba(255,255,255,.05);white-space:nowrap}
.tbl td{padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);font-size:13px;color:#e2e2e2;vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(255,255,255,.025)}
.sec-title{font-size:18px;font-weight:800;margin-bottom:16px;color:#fff}
.sub-title{font-weight:700;font-size:15px;margin-bottom:10px;color:#fff}
.empty{padding:26px;text-align:center;color:rgba(255,255,255,.3);font-size:14px}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(249,115,22,.15);color:#f97316}
.udot{width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle}
.c-up{color:#10b981;font-size:13px;font-weight:700}
.c-dn{color:#ef4444;font-size:13px;font-weight:700}
.c-eq{color:rgba(255,255,255,.4);font-size:13px;font-weight:700}
.swatch{width:36px;height:36px;border-radius:10px;cursor:pointer;transition:transform .2s;border:2px solid transparent;display:inline-block}
.swatch:hover{transform:scale(1.15)}
.prog{background:rgba(255,255,255,.07);border-radius:6px;height:8px;overflow:hidden}
.prog-fill{height:8px;border-radius:6px}

/* ── DUYURU ──────────────────────────────────────────── */
.ann-card{background:rgba(255,255,255,.04);border-radius:14px;padding:16px;margin-bottom:10px;border-left:3px solid var(–acc1)}
.ann-pin{background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.3);border-radius:6px;font-size:11px;font-weight:700;padding:2px 8px;display:inline-block;margin-bottom:6px}
.ann-new{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);border-radius:6px;font-size:11px;font-weight:700;padding:2px 8px;display:inline-block;margin-left:4px}

/* ── MODAL ───────────────────────────────────────────── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#181828;border:1px solid rgba(255,255,255,.12);border-radius:20px 20px 0 0;padding:22px 18px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom))}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mhead h3{color:#fff;font-size:16px;font-weight:700}
.mcls{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px}

/* ── CHAT ────────────────────────────────────────────── */
.chat-wrap{display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto;padding:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.msg{display:flex;flex-direction:column;max-width:84%}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg-bub{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.mine .msg-bub{background:linear-gradient(135deg,rgba(249,115,22,.4),rgba(239,68,68,.4));border:1px solid rgba(249,115,22,.3);color:#fff}
.msg.theirs .msg-bub{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#e2e2e2}
.msg-meta{font-size:11px;color:rgba(255,255,255,.3);margin-top:3px;padding:0 4px}

/* ── TOAST ───────────────────────────────────────────── */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap;animation:tIn .3s ease}
@keyframes tIn{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes fUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.fin{animation:fUp .3s ease}

/* ── LOGIN ───────────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,.13) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(239,68,68,.08) 0%,transparent 50%)}
.login-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:40px 30px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.55)}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(min-width:600px){
.mbg{align-items:center;padding:20px}
.mbox{border-radius:20px}
.toast{top:22px}
}
@media(min-width:768px){
.wrap{padding:20px 24px}
input,select,textarea{font-size:14px}
.tbl{min-width:unset}
.bp{font-size:14px;padding:11px 20px}
}
@media(max-width:767px){
.tab-bar{display:none}
.bnav{display:block}
.wrap{padding:12px 12px;padding-bottom:calc(var(–bnav-h) + 14px + env(safe-area-inset-bottom))}
.sec-title{font-size:16px;margin-bottom:12px}
.card{padding:12px 13px}
.panel{padding:14px}
.g4{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(2,1fr)}
.tbl th,.tbl td{padding:9px 11px;font-size:12px}
}
@media(max-width:360px){
.logo-txt{max-width:100px;font-size:14px}
.g2{grid-template-columns:1fr}
}
</style>

</head>
<body>
<div id="app">Yükleniyor...</div>
<script>
(function(){
"use strict";

/* ══════════════════════════════════════════════════════
SABITLER & STATE
══════════════════════════════════════════════════════ */
var AU = ‘admin’;
var THEMES = [
{n:‘Turuncu’,a:’#f97316’,b:’#ef4444’},
{n:‘Mavi’,   a:’#3b82f6’,b:’#06b6d4’},
{n:‘Yesil’,  a:’#10b981’,b:’#059669’},
{n:‘Mor’,    a:’#8b5cf6’,b:’#ec4899’},
{n:‘Altin’,  a:’#f59e0b’,b:’#f97316’}
];
var ADMIN_TABS = [
{k:‘dashboard’,i:‘🏠’,l:‘Dash’},
{k:‘personnel’,i:‘👥’,l:‘Pers’},
{k:‘timesheet’,i:‘📋’,l:‘Puan’},
{k:‘income’,   i:‘💰’,l:‘Gelir’},
{k:‘expenses’, i:‘📉’,l:‘Gider’},
{k:‘summary’,  i:‘📊’,l:‘Özet’},
{k:‘messages’, i:‘💬’,l:‘Mesaj’},
{k:‘announce’, i:‘📢’,l:‘Duyuru’},
{k:‘settings’, i:‘⚙️’,l:‘Ayar’}
];

var AUTH=null, TAB=‘dashboard’;
var APWD=‘admin123’, DB={};
try{APWD=localStorage.getItem(‘biz_apwd’)||‘admin123’;}catch(e){}

/* ── DB ─────────────────────────────────────────────── */
function freshDB(){
return{
personnel:[],timesheet:[],income:[],expenses:[],
cats:[‘Kira’,‘Fatura’,‘Malzeme’,‘Personel’,‘Diger’],
messages:[],announcements:[],
settings:{bizName:‘BizPanel’,themeA:’#f97316’,themeB:’#ef4444’,logo:‘⚡’}
};
}
function initDB(){
try{
var r=localStorage.getItem(‘biz4’);
if(!r)return freshDB();
var d=JSON.parse(r),f=freshDB();
d.settings=Object.assign({},f.settings,d.settings||{});
if(!d.announcements)d.announcements=[];
return Object.assign({},f,d);
}catch(e){return freshDB();}
}
function save(){try{localStorage.setItem(‘biz4’,JSON.stringify(DB));}catch(e){}}
DB=initDB();

/* ── UTILS ──────────────────────────────────────────── */
function el(id){return document.getElementById(id);}
function val(id){var e=el(id);return e?e.value.trim():’’;}
function nf(n){return Number(n||0).toLocaleString(‘tr’);}
function applyTheme(){
var a=DB.settings.themeA||’#f97316’,b=DB.settings.themeB||’#ef4444’;
document.documentElement.style.setProperty(’–acc1’,a);
document.documentElement.style.setProperty(’–acc2’,b);
var pt=el(‘page-title’);if(pt)pt.textContent=DB.settings.bizName||‘BizPanel’;
}
function toast(msg,type){
var d=document.createElement(‘div’);d.className=‘toast’;
d.style.background=type===‘err’?‘linear-gradient(135deg,#ef4444,#dc2626)’:‘linear-gradient(135deg,#10b981,#059669)’;
d.textContent=(type===‘err’?‘✗ ‘:‘✓ ‘)+msg;
document.body.appendChild(d);
setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},3000);
}
function openModal(html,bindFn){
closeModal();
var bg=document.createElement(‘div’);bg.className=‘mbg’;bg.id=‘mbg’;
bg.innerHTML=’<div class="mbox">’+html+’</div>’;
bg.addEventListener(‘click’,function(e){if(e.target===bg)closeModal();});
document.body.appendChild(bg);
if(bindFn)bindFn();
}
function closeModal(){var m=el(‘mbg’);if(m)m.parentNode.removeChild(m);}
function confirmModal(msg, onYes){
openModal(
‘<div class="mhead"><h3>Onay</h3><button class="mcls" id="mc">✕</button></div>’
+’<p style="color:rgba(255,255,255,.7);font-size:14px;margin-bottom:20px">’+msg+’</p>’
+’<div style="display:flex;gap:10px">’
+’<button class="bp full" id="cm-yes">Evet, Sil</button>’
+’<button class="bs full" id="cm-no" style="flex:1">İptal</button>’
+’</div>’,
function(){
el(‘mc’).onclick=closeModal;
el(‘cm-no’).onclick=closeModal;
el(‘cm-yes’).onclick=function(){closeModal();onYes();};
}
);
}
function thisMonth(){return new Date().toISOString().slice(0,7);}
function lastMonth(){var d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}
function mIncome(m){return DB.income.reduce(function(s,i){return(i.date&&i.date.indexOf(m)===0)?s+Number(i.cash||0)+Number(i.card||0):s;},0);}
function mExpense(m){return DB.expenses.reduce(function(s,e){return(e.date&&e.date.indexOf(m)===0)?s+Number(e.amount||0):s;},0);}
function mWages(m){return DB.timesheet.reduce(function(s,t){if(!t.date||t.date.indexOf(m)!==0)return s;var p=DB.personnel.filter(function(x){return x.id===t.pid;})[0];return s+(p?Number(t.hours)*Number(p.rate):0);},0);}
function pct(a,b){if(b===0)return a>0?100:0;return Math.round((a-b)/b*100);}
function cbadge(cur,prev){var p=pct(cur,prev);if(p>0)return’<span class="c-up">▲ %’+p+’</span>’;if(p<0)return’<span class="c-dn">▼ %’+Math.abs(p)+’</span>’;return’<span class="c-eq">— %0</span>’;}
function unread(uid){return DB.messages.filter(function(m){return m.to===uid&&!m.read;}).length;}
function unreadAnn(pid){return DB.announcements.filter(function(a){return!a.readBy||a.readBy.indexOf(pid)===-1;}).length;}
function statCard(icon,label,value,color){
return’<div class="card" style="border-color:'+color+'33">’
+’<div style="font-size:20px;margin-bottom:6px">’+icon+’</div>’
+’<div style="color:'+color+';font-size:18px;font-weight:800;line-height:1.2">’+value+’</div>’
+’<div style="color:rgba(255,255,255,.45);font-size:12px;margin-top:4px">’+label+’</div>’
+’</div>’;
}

/* ══════════════════════════════════════════════════════
RENDER
══════════════════════════════════════════════════════ */
function render(){
applyTheme();
var app=el(‘app’);if(!app)return;
if(!AUTH){app.innerHTML=loginHTML();bindLogin();return;}
if(AUTH.role===‘staff’){app.innerHTML=staffHTML();bindStaff();return;}
app.innerHTML=shellHTML();
bindShell();showTab(TAB);
}

/* ══════════════════════════════════════════════════════
LOGIN
══════════════════════════════════════════════════════ */
function loginHTML(){
var n=DB.settings.bizName||‘BizPanel’;
var a=DB.settings.themeA,b=DB.settings.themeB;
var ico=DB.settings.logo||‘⚡’;
return’<div class="login-wrap"><div class="login-box">’
+’<div style="text-align:center;margin-bottom:28px">’
+’<div style="width:56px;height:56px;background:linear-gradient(135deg,'+a+','+b+');border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px">’+ico+’</div>’
+’<div style="font-size:22px;font-weight:800;background:linear-gradient(135deg,'+a+','+b+');-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">’+n+’</div>’
+’<p style="color:rgba(255,255,255,.38);font-size:13px;margin:6px 0 0">İşletme Yönetim Sistemi</p>’
+’</div>’
+’<input id="lu" placeholder="Kullanıcı Adı" autocomplete="username" autocapitalize="none"/>’
+’<input id="lp" type="password" placeholder="Şifre" autocomplete="current-password"/>’
+’<p id="le" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;margin-bottom:10px"></p>’
+’<button class="bp full" id="lgbtn">Giriş Yap →</button>’
+’</div></div>’;
}
function bindLogin(){
function go(){
var u=val(‘lu’),p=el(‘lp’)?el(‘lp’).value:’’;
if(u===AU&&p===APWD){AUTH={role:‘admin’};render();return;}
var found=null;
for(var i=0;i<DB.personnel.length;i++){if(DB.personnel[i].username===u&&DB.personnel[i].password===p){found=DB.personnel[i];break;}}
if(found){AUTH={role:‘staff’,id:found.id};render();return;}
var le=el(‘le’);if(le)le.textContent=‘Kullanıcı adı veya şifre hatalı!’;
}
var b=el(‘lgbtn’);if(b)b.onclick=go;
var lp=el(‘lp’);if(lp)lp.onkeydown=function(e){if(e.key===‘Enter’)go();};
}

/* ══════════════════════════════════════════════════════
STAFF VIEW
══════════════════════════════════════════════════════ */
function staffHTML(){
var p=null;
for(var i=0;i<DB.personnel.length;i++){if(DB.personnel[i].id===AUTH.id){p=DB.personnel[i];break;}}
if(!p)return’<div style="padding:60px;text-align:center">Personel bulunamadı.</div>’;

var sh=DB.timesheet.filter(function(t){return t.pid===p.id;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
var tH=sh.reduce(function(s,t){return s+Number(t.hours);},0);
var ur=unread(p.id), ua=unreadAnn(p.id);

var vardiyaRows=sh.length===0?’<tr><td colspan="3" class="empty">Henüz kayıt yok</td></tr>’

}
window._cd={labels:labels,inc:incD,exp:expD,wag:wagD};
var tm=thisMonth(),lm=lastMonth();
var inc=mIncome(tm),exp=mExpense(tm),wag=mWages(tm),net=inc-exp-wag;
var linc=mIncome(lm),lexp=mExpense(lm);
var aInc=DB.income.reduce(function(s,i){return s+Number(i.cash||0)+Number(i.card||0);},0);
var aExp=DB.expenses.reduce(function(s,e){return s+Number(e.amount||0);},0);
var aWag=DB.timesheet.reduce(function(s,t){var p=DB.personnel.filter(function(x){return x.id===t.pid;})[0];return s+(p?Number(t.hours)*Number(p.rate):0);},0);

var cardT=DB.income.filter(function(i){return i.date&&i.date.indexOf(tm)===0;}).reduce(function(s,i){return s+Number(i.card||0);},0);

var mH=mSh.reduce(function(s,t){return s+Number(t.hours);},0);

var aH=aSh.reduce(function(s,t){return s+Number(t.hours);},0);
var ls=aSh.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);})[0];

var catT={};
DB.expenses.filter(function(e){return e.date&&e.date.indexOf(tm)===0;}).forEach(function(e){catT[e.cat]=(catT[e.cat]||0)+Number(e.amount||0);});
var catRows=Object.keys(catT).length===0?’<tr><td colspan="4" class="empty">Bu ay gider yok</td></tr>’

+’<div class="card"><div style="color:rgba(255,255,255,.45);font-size:12px;margin-bottom:5px">Bu Ay Nakit/Kart</div><span style="color:#10b981;font-weight:700">₺’+nf(cashT)+’</span> <span style="color:rgba(255,255,255,.3);font-size:11px">nakit</span><br><span style="color:#06b6d4;font-weight:700">₺’+nf(cardT)+’</span> <span style="color:rgba(255,255,255,.3);font-size:11px">kart</span></div>’

+’<div class="sub-title">🗂️ Tüm Zamanlar</div>’
+’<div class="g3">’+statCard(‘💰’,‘Toplam Gelir’,‘₺’+nf(aInc),’#10b981’)+statCard(‘📉’,‘Toplam Gider’,‘₺’+nf(aExp),’#ef4444’)+statCard(‘👥’,‘Toplam Maaş’,‘₺’+nf(aWag),’#8b5cf6’)+statCard(‘📋’,‘Vardiya’,DB.timesheet.length+’ adet’,’#06b6d4’)+statCard(‘👤’,‘Personel’,DB.personnel.length+’ kişi’,’#f59e0b’)+statCard(‘✨’,‘Genel Net’,‘₺’+nf(aInc-aExp-aWag),(aInc-aExp-aWag)>=0?’#10b981’:’#ef4444’)+’</div>’;
}

if(logo)DB.settings.logo=logo;
if(pwd){APWD=pwd;try{localStorage.setItem(‘biz_apwd’,pwd);}catch(e){}}
save();applyTheme();toast(‘Kaydedildi!’);
};
document.querySelectorAll(’.swatch’).forEach(function(s){
s.onclick=function(){var t=THEMES[parseInt(s.getAttribute(‘data-i’))];DB.settings.themeA=t.a;DB.settings.themeB=t.b;save();applyTheme();render();};
});
document.querySelectorAll(’.dc’).forEach(function(b){
b.onclick=function(){DB.cats.splice(parseInt(b.getAttribute(‘data-i’)),1);save();showTab(‘settings’);};
});
var ac=el(‘acat’);if(ac)ac.onclick=function(){var c=val(‘ncat’);if(!c)return;DB.cats.push(c);save();toast(‘Eklendi!’);showTab(‘settings’);};
}

/* ══════════════════════════════════════════════════════
PDF
══════════════════════════════════════════════════════ */
function doPDF(){
try{
var jsPDF=window.jspdf?window.jspdf.jsPDF:null;
if(!jsPDF){toast(‘PDF kütüphanesi yüklenmedi!’,‘err’);return;}
var doc=new jsPDF();
var tm=thisMonth();
var inc=mIncome(tm),exp=mExpense(tm),wag=mWages(tm),net=inc-exp-wag;
doc.setFontSize(18);doc.text((DB.settings.bizName||‘BizPanel’)+’ - Rapor’,14,18);
doc.setFontSize(11);doc.text(’Tarih: ’+new Date().toLocaleDateString(‘tr’),14,28);
doc.autoTable({startY:35,head:[[‘Metrik’,‘Tutar’]],body:[
[‘Bu Ay Gelir’,’TL ’+nf(inc)],[‘Bu Ay Gider’,’TL ’+nf(exp)],
[‘Bu Ay Maas’,’TL ‘+nf(wag)],[‘Net Kar’,‘TL ‘+nf(net)],
[‘Personel’,DB.personnel.length+’ kisi’]
],styles:{fontSize:11}});
if(DB.personnel.length>0){
doc.autoTable({startY:doc.lastAutoTable.finalY+10,
head:[[‘Ad Soyad’,‘Ucret/sa’,‘Toplam Saat’,‘Toplam Kazanc’]],
body:DB.personnel.map(function(p){
var aH=DB.timesheet.filter(function(t){return t.pid===p.id;}).reduce(function(s,t){return s+Number(t.hours);},0);
return[p.firstName+’ ’+p.lastName,‘TL ‘+nf(p.rate),aH+’ sa’,’TL ’+nf(aH*Number(p.rate))];
}),styles:{fontSize:10}});
}
doc.save(‘bizpanel-rapor.pdf’);toast(‘PDF indirildi!’);
}catch(e){toast(’PDF hatasi: ’+e.message,‘err’);}
}

function startApp(){
if(document.readyState===‘loading’){
document.addEventListener(‘DOMContentLoaded’,render);
}else{
render();
}
}
window.startApp=startApp;

})();

<!-- CDN scriptleri body sonunda yükleniyor — Vercel uyumlu -->

<script>
(function(){
  var loaded=0;
  var total=3;
  function onLoad(){loaded++;if(loaded===total)startApp();}
  function loadScript(src){
    var s=document.createElement('script');
    s.src=src;
    s.onload=onLoad;
    s.onerror=function(){loaded++;if(loaded===total)startApp();};
    document.body.appendChild(s);
  }
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js');
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
})();
</script>
