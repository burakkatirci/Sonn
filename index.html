<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">BizPanel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0d0d1a;--bg2:#181828;--bg3:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.09);
  --acc1:#f97316;--acc2:#ef4444;
  --green:#10b981;--blue:#06b6d4;--purple:#8b5cf6;--yellow:#f59e0b;--pink:#ec4899;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
#app{background:var(--bg);min-height:100vh}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input,select,textarea{
  background:rgba(255,255,255,0.08)!important;
  border:1px solid rgba(255,255,255,0.18)!important;
  color:#fff!important;border-radius:10px;padding:10px 14px;
  width:100%;outline:none;font-size:14px;display:block;margin-bottom:10px
}
input:focus,select:focus,textarea:focus{border-color:rgba(249,115,22,0.6)!important}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.35)!important}
select option{background:#1e1e35;color:#fff}
textarea{resize:vertical;min-height:80px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.5);border-radius:3px}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff;border:none;padding:11px 22px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:opacity .2s;display:inline-block}
.btn-primary:hover{opacity:.82}
.btn-sec{background:rgba(255,255,255,0.09);color:#ccc;border:1px solid rgba(255,255,255,0.14);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.btn-sec:hover{background:rgba(255,255,255,0.14)}
.btn-del{background:rgba(239,68,68,0.16);color:#ef4444;border:1px solid rgba(239,68,68,0.32);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.btn-del:hover{background:rgba(239,68,68,0.28)}
.btn-edit{background:rgba(6,182,212,0.16);color:#06b6d4;border:1px solid rgba(6,182,212,0.32);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;margin-right:6px;transition:all .2s}
.btn-edit:hover{background:rgba(6,182,212,0.28)}

/* LAYOUT */
.header{background:rgba(255,255,255,0.03);border-bottom:1px solid var(–border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-ico{width:34px;height:34px;background:linear-gradient(135deg,var(–acc1),var(–acc2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-txt{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(–acc1),var(–acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hbtns{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tab-bar{display:flex;gap:2px;padding:14px 20px 0;overflow-x:auto;border-bottom:1px solid var(–border);background:var(–bg)}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:9px 18px;border:none;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap;border-radius:9px 9px 0 0;transition:all .2s;font-family:‘DM Sans’,sans-serif;background:transparent;color:rgba(255,255,255,0.45)}
.tab.on{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff}
.tab:hover:not(.on){background:rgba(249,115,22,0.12);color:rgba(255,255,255,0.75)}
.wrap{padding:22px 20px;max-width:1200px;margin:0 auto}
.panel{background:var(–bg3);border:1px solid var(–border);border-radius:18px;padding:22px;margin-bottom:18px}
.card{background:rgba(255,255,255,0.04);border-radius:18px;padding:20px 22px;border:1px solid rgba(255,255,255,0.07)}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:14px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:13px 18px;text-align:left;font-size:12px;color:rgba(255,255,255,0.45);font-weight:600;background:rgba(255,255,255,0.05);white-space:nowrap}
.tbl td{padding:11px 18px;border-top:1px solid rgba(255,255,255,0.055);font-size:14px;color:#e2e2e2;vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(255,255,255,0.025)}
.tbl-wrap{border:1px solid var(–border);border-radius:18px;overflow:hidden}
.sec-title{font-size:20px;font-weight:800;margin-bottom:18px;color:#fff}
.empty{padding:32px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px}
.badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:rgba(249,115,22,0.15);color:#f97316}
.unread-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle}
.comp-up{color:#10b981;font-size:13px;font-weight:700}
.comp-dn{color:#ef4444;font-size:13px;font-weight:700}
.comp-eq{color:rgba(255,255,255,0.4);font-size:13px;font-weight:700}
.color-swatch{width:38px;height:38px;border-radius:10px;cursor:pointer;transition:transform .2s;border:2px solid transparent;display:inline-block}
.color-swatch:hover{transform:scale(1.15)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:#181828;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:30px;width:100%;max-width:500px;box-shadow:0 28px 80px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mhead h3{color:#fff;font-size:17px;font-weight:700}
.mclose{background:rgba(255,255,255,0.1);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px}

/* TOAST */
.toast{position:fixed;top:22px;right:22px;z-index:9999;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.45);pointer-events:none;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(70px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-in{animation:fadeUp .3s ease}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,0.13) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(239,68,68,0.08) 0%,transparent 50%)}
.login-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:22px;padding:44px 38px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,0.55)}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;gap:10px;max-height:380px;overflow-y:auto;padding:4px;margin-bottom:14px}
.msg{display:flex;flex-direction:column;max-width:80%}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.msg.mine .msg-bubble{background:linear-gradient(135deg,rgba(249,115,22,0.4),rgba(239,68,68,0.4));border:1px solid rgba(249,115,22,0.3);color:#fff}
.msg.theirs .msg-bubble{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#e2e2e2}
.msg-meta{font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;padding:0 4px}

@media(max-width:768px){
.wrap{padding:14px 12px}
.mbox{padding:22px 16px}
.tbl td,.tbl th{padding:9px 11px;font-size:13px}
.tab{padding:8px 12px;font-size:12px}
.login-box{padding:32px 22px}
}
</style>

</head>
<body>
<div id="app">Yükleniyor...</div>

<script>
(function() {
  "use strict";

  // ─── SABITLER ───────────────────────────────────────────
  var ADMIN_USER = 'admin';
  var THEME_PRESETS = [
    {name:'Turuncu', a:'#f97316', b:'#ef4444'},
    {name:'Mavi',    a:'#3b82f6', b:'#06b6d4'},
    {name:'Yesil',   a:'#10b981', b:'#059669'},
    {name:'Mor',     a:'#8b5cf6', b:'#ec4899'},
    {name:'Altin',   a:'#f59e0b', b:'#f97316'}
  ];

  // ─── STATE ──────────────────────────────────────────────
  var AUTH = null;
  var TAB  = 'dashboard';
  var ADMIN_PWD = 'admin123';
  var DB = {};

  try { ADMIN_PWD = localStorage.getItem('biz_admin_pwd') || 'admin123'; } catch(e){}

  function freshDB() {
    return {
      personnel: [],
      timesheet: [],
      income:    [],
      expenses:  [],
      cats:      ['Kira','Fatura','Malzeme','Personel','Diger'],
      messages:  [],
      settings:  {bizName:'BizPanel', themeA:'#f97316', themeB:'#ef4444', logo:'⚡'}
    };
  }

  function initDB() {
    try {
      var raw = localStorage.getItem('biz4');
      if (!raw) return freshDB();
      var d = JSON.parse(raw);
      var f = freshDB();
      d.settings = Object.assign({}, f.settings, d.settings || {});
      return Object.assign({}, f, d);
    } catch(e) { return freshDB(); }
  }

  function save() {
    try { localStorage.setItem('biz4', JSON.stringify(DB)); } catch(e){}
  }

  DB = initDB();

  // ─── YARDIMCILAR ────────────────────────────────────────
  function el(id) { return document.getElementById(id); }
  function val(id) { var e = el(id); return e ? e.value.trim() : ''; }

  function applyTheme() {
    document.documentElement.style.setProperty('--acc1', DB.settings.themeA || '#f97316');
    document.documentElement.style.setProperty('--acc2', DB.settings.themeB || '#ef4444');
    var pt = el('page-title');
    if (pt) pt.textContent = DB.settings.bizName || 'BizPanel';
  }

  function toast(msg, type) {
    var d = document.createElement('div');
    d.className = 'toast';
    d.style.background = (type === 'err')
      ? 'linear-gradient(135deg,#ef4444,#dc2626)'
      : 'linear-gradient(135deg,#10b981,#059669)';
    d.textContent = ((type === 'err') ? '✗ ' : '✓ ') + msg;
    document.body.appendChild(d);
    setTimeout(function() { if (d.parentNode) d.parentNode.removeChild(d); }, 3000);
  }

  function openModal(html, bindFn) {
    closeModal();
    var bg = document.createElement('div');
    bg.className = 'mbg';
    bg.id = 'mbg';
    bg.innerHTML = '<div class="mbox">' + html + '</div>';
    bg.addEventListener('click', function(e) { if (e.target === bg) closeModal(); });
    document.body.appendChild(bg);
    if (bindFn) bindFn();
  }

  function closeModal() { var m = el('mbg'); if (m) m.parentNode.removeChild(m); }

  function thisMonth() { return new Date().toISOString().slice(0,7); }
  function lastMonth() { var d = new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); }

  function monthIncome(m) {
    return DB.income.reduce(function(s,i) {
      return i.date && i.date.indexOf(m) === 0 ? s + Number(i.cash||0) + Number(i.card||0) : s;
    }, 0);
  }
  function monthExpense(m) {
    return DB.expenses.reduce(function(s,e) {
      return e.date && e.date.indexOf(m) === 0 ? s + Number(e.amount||0) : s;
    }, 0);
  }
  function monthWages(m) {
    return DB.timesheet.reduce(function(s,t) {
      if (!t.date || t.date.indexOf(m) !== 0) return s;
      var p = DB.personnel.filter(function(x) { return x.id === t.pid; })[0];
      return s + (p ? Number(t.hours) * Number(p.rate) : 0);
    }, 0);
  }

  function pct(a, b) {
    if (b === 0) return a > 0 ? 100 : 0;
    return Math.round((a - b) / b * 100);
  }
  function compBadge(cur, prev) {
    var p = pct(cur, prev);
    if (p > 0) return '<span class="comp-up">▲ %' + p + '</span>';
    if (p < 0) return '<span class="comp-dn">▼ %' + Math.abs(p) + '</span>';
    return '<span class="comp-eq">— %0</span>';
  }

  function unreadCount(uid) {
    return DB.messages.filter(function(m) { return m.to === uid && !m.read; }).length;
  }

  function numFmt(n) { return Number(n).toLocaleString('tr'); }

  // ─── KART ───────────────────────────────────────────────
  function statCard(icon, label, value, color) {
    return '<div class="card" style="border-color:' + color + '33">'
      + '<div style="font-size:26px;margin-bottom:8px">' + icon + '</div>'
      + '<div style="color:' + color + ';font-size:22px;font-weight:800">' + value + '</div>'
      + '<div style="color:rgba(255,255,255,0.45);font-size:13px;margin-top:2px">' + label + '</div>'
      + '</div>';
  }

  // ─── RENDER ─────────────────────────────────────────────
  function render() {
    applyTheme();
    var app = el('app');
    if (!app) return;
    if (!AUTH)               { app.innerHTML = loginHTML();  bindLogin();  return; }
    if (AUTH.role === 'staff') { app.innerHTML = staffHTML(); bindStaff();  return; }
    app.innerHTML = adminShellHTML();
    bindShell();
    showTab(TAB);
  }

  // ════════════════════════════════════════════════════════
  // LOGIN
  // ════════════════════════════════════════════════════════
  function loginHTML() {
    var n   = DB.settings.bizName || 'BizPanel';
    var a   = DB.settings.themeA  || '#f97316';
    var b   = DB.settings.themeB  || '#ef4444';
    var ico = DB.settings.logo    || '⚡';
    return '<div class="login-wrap">'
      + '<div class="login-box">'
      + '<div style="text-align:center;margin-bottom:30px">'
      + '<div style="width:56px;height:56px;background:linear-gradient(135deg,' + a + ',' + b + ');border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px">' + ico + '</div>'
      + '<div style="font-size:24px;font-weight:800;background:linear-gradient(135deg,' + a + ',' + b + ');-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">' + n + '</div>'
      + '<p style="color:rgba(255,255,255,0.38);font-size:13px;margin:8px 0 0">İşletme Yönetim Sistemi</p>'
      + '</div>'
      + '<input id="lu" placeholder="Kullanıcı Adı" autocomplete="username"/>'
      + '<input id="lp" type="password" placeholder="Şifre" autocomplete="current-password"/>'
      + '<p id="le" style="color:#ef4444;font-size:13px;text-align:center;min-height:18px;margin-bottom:10px"></p>'
      + '<button class="btn-primary" id="lgbtn" style="width:100%;padding:13px;font-size:15px">Giriş Yap →</button>'
      + '<p style="color:rgba(255,255,255,0.22);font-size:11px;text-align:center;margin-top:16px">Admin: ' + ADMIN_USER + ' / ' + ADMIN_PWD + '</p>'
      + '</div></div>';
  }

  function bindLogin() {
    function doLogin() {
      var u = val('lu');
      var p = el('lp') ? el('lp').value : '';
      if (u === ADMIN_USER && p === ADMIN_PWD) { AUTH = {role:'admin'}; render(); return; }
      var found = null;
      for (var i = 0; i < DB.personnel.length; i++) {
        if (DB.personnel[i].username === u && DB.personnel[i].password === p) { found = DB.personnel[i]; break; }
      }
      if (found) { AUTH = {role:'staff', id:found.id}; render(); return; }
      var le = el('le');
      if (le) le.textContent = 'Kullanıcı adı veya şifre hatalı!';
    }
    var btn = el('lgbtn'); if (btn) btn.onclick = doLogin;
    var lp  = el('lp');   if (lp)  lp.onkeydown = function(e) { if (e.key === 'Enter') doLogin(); };
  }

  // ════════════════════════════════════════════════════════
  // STAFF
  // ════════════════════════════════════════════════════════
  function staffHTML() {
    var p = null;
    for (var i = 0; i < DB.personnel.length; i++) { if (DB.personnel[i].id === AUTH.id) { p = DB.personnel[i]; break; } }
    if (!p) return '<div style="padding:60px;text-align:center">Personel bulunamadı.</div>';

    var sh = DB.timesheet.filter(function(t) { return t.pid === p.id; })
      .sort(function(a,b) { return new Date(b.date) - new Date(a.date); });
    var tH = sh.reduce(function(s,t) { return s + Number(t.hours); }, 0);
    var earn = tH * Number(p.rate);
    var unread = unreadCount(p.id);

    var rows = sh.length === 0
      ? '<tr><td colspan="3" class="empty">Henüz kayıt yok</td></tr>'
      : sh.map(function(s) {
          return '<tr>'
            + '<td>' + s.date + '</td>'
            + '<td style="color:#06b6d4;font-weight:700">' + s.hours + ' sa</td>'
            + '<td style="color:#10b981;font-weight:700">₺' + numFmt(Number(s.hours)*Number(p.rate)) + '</td>'
            + '</tr>';
        }).join('');

    var myMsgs = DB.messages
      .filter(function(m) { return m.to === p.id || m.from === p.id; })
      .sort(function(a,b) { return a.ts - b.ts; });

    var msgHtml = myMsgs.length === 0
      ? '<div class="empty">Henüz mesaj yok</div>'
      : myMsgs.map(function(m) {
          var mine = m.from === p.id;
          return '<div class="msg ' + (mine ? 'mine' : 'theirs') + '">'
            + '<div class="msg-bubble">' + m.text + '</div>'
            + '<div class="msg-meta">' + (mine ? 'Siz' : 'Yönetici') + ' · ' + new Date(m.ts).toLocaleString('tr') + '</div>'
            + '</div>';
        }).join('');

    var a = DB.settings.themeA, b2 = DB.settings.themeB;
    return '<div class="header">'
      + '<div class="logo-wrap">'
      + '<div class="logo-ico" style="background:linear-gradient(135deg,' + a + ',' + b2 + ')">' + (DB.settings.logo||'⚡') + '</div>'
      + '<span class="logo-txt">' + (DB.settings.bizName||'BizPanel') + '</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:10px">'
      + '<span style="color:rgba(255,255,255,0.5);font-size:13px">👋 ' + p.firstName + '</span>'
      + '<button class="btn-sec" id="lout">Çıkış</button>'
      + '</div></div>'
      + '<div class="wrap fade-in">'
      + '<h2 class="sec-title">Çalışma Özetim</h2>'
      + '<div class="g3">'
      + statCard('📅','Vardiya', sh.length, '#06b6d4')
      + statCard('⏱️','Toplam Saat', tH + ' sa', '#8b5cf6')
      + statCard('💵','Kazanç', '₺' + numFmt(earn), '#10b981')
      + '</div>'
      + '<div class="tbl-wrap" style="margin-bottom:24px">'
      + '<table class="tbl"><thead><tr><th>Tarih</th><th>Saat</th><th>Kazanç</th></tr></thead>'
      + '<tbody>' + rows + '</tbody></table></div>'
      + '<div class="panel">'
      + '<p style="font-weight:700;margin-bottom:12px">💬 Mesajlar ' + (unread > 0 ? '<span class="unread-dot"></span>' : '') + '</p>'
      + '<div class="chat-wrap" id="staff-chat">' + msgHtml + '</div>'
      + '<div style="display:flex;gap:8px">'
      + '<input id="staff-msg-inp" placeholder="Mesaj yazın..." style="margin-bottom:0"/>'
      + '<button class="btn-primary" id="staff-send">Gönder</button>'
      + '</div></div></div>';
  }

  function bindStaff() {
    var p = null;
    for (var i = 0; i < DB.personnel.length; i++) { if (DB.personnel[i].id === AUTH.id) { p = DB.personnel[i]; break; } }
    el('lout').onclick = function() { AUTH = null; render(); };
    DB.messages.forEach(function(m) { if (m.to === p.id) m.read = true; });
    save();
    el('staff-send').onclick = function() {
      var txt = val('staff-msg-inp');
      if (!txt) return;
      DB.messages.push({id:String(Date.now()), from:p.id, to:'admin', text:txt, ts:Date.now(), read:false});
      save(); toast('Gönderildi!'); render();
    };
    var chat = el('staff-chat');
    if (chat) chat.scrollTop = chat.scrollHeight;
  }

  // ════════════════════════════════════════════════════════
  // ADMIN SHELL
  // ════════════════════════════════════════════════════════
  function adminShellHTML() {
    var tabs = [
      ['dashboard','🏠 Dash'],
      ['personnel','👥 Pers'],
      ['timesheet','📋 Puan'],
      ['income',   '💰 Gelir'],
      ['expenses', '📉 Gider'],
      ['summary',  '📊 Özet'],
      ['messages', '💬 Mesaj'],
      ['settings', '⚙️ Ayar']
    ];
    var totalUnread = unreadCount('admin');
    var a = DB.settings.themeA, b = DB.settings.themeB;

  function bindShell() {

    el('btnpdf').onclick = downloadPDF;
    document.querySelectorAll('.tab').forEach(function(b) {
      b.onclick = function() { TAB = b.getAttribute('data-t'); showTab(TAB); };
    });
  }

  function showTab(t) {
    var tc = el('tc'); if (!tc) return;
    document.querySelectorAll('.tab').forEach(function(x) {
      x.className = 'tab ' + (x.getAttribute('data-t') === t ? 'on' : '');
    });
    if      (t === 'dashboard') { tc.innerHTML = dashHTML();     bindDash(); }
    else if (t === 'personnel') { tc.innerHTML = pHTML();        bindP(); }
    else if (t === 'timesheet') { tc.innerHTML = tHTML();        bindT(); }
    else if (t === 'income')    { tc.innerHTML = iHTML();        bindI(); }
    else if (t === 'expenses')  { tc.innerHTML = eHTML();        bindE(); }
    else if (t === 'summary')   { tc.innerHTML = sHTML();        bindS(); }
    else if (t === 'messages')  { tc.innerHTML = msgHTML();      bindMsg(); }
    else if (t === 'settings')  { tc.innerHTML = settingsHTML(); bindSettings(); }
  }

  // ════════════════════════════════════════════════════════
  // ÖZET
  // ════════════════════════════════════════════════════════
  function sHTML() {
    var months = [], labels = [], incData = [], expData = [], wagData = [];
    for (var i = 5; i >= 0; i--) {
      var d = new Date();
      d.setMonth(d.getMonth() - i);
      var m = d.toISOString().slice(0,7);
      months.push(m);
      labels.push(m);
      incData.push(monthIncome(m));
      expData.push(monthExpense(m));
      wagData.push(monthWages(m));
    }
    window._bizChartData = {labels:labels, inc:incData, exp:expData, wag:wagData};

    var tm = thisMonth();
    var inc = monthIncome(tm), exp = monthExpense(tm), wag = monthWages(tm), net = inc-exp-wag;

    return '<h2 class="sec-title">📊 Aylık Özet</h2>'
      + '<div class="g4">'
      + statCard('💰','Bu Ay Gelir', '₺'+numFmt(inc), '#10b981')
      + statCard('📉','Bu Ay Gider', '₺'+numFmt(exp), '#ef4444')
      + statCard('👥','Bu Ay Maaş',  '₺'+numFmt(wag), '#8b5cf6')
      + statCard(net>=0?'📈':'📉','Net Kar', '₺'+numFmt(net), net>=0?'#10b981':'#ef4444')
      + '</div>'
      + '<div class="panel"><canvas id="sum-chart"></canvas></div>';
  }

  function bindS() {
    var cd = window._bizChartData;
    if (!cd) return;
    setTimeout(function() {
      var canvas = el('sum-chart');
      if (!canvas || !window.Chart) return;
      new window.Chart(canvas, {
        type: 'bar',
        data: {
          labels: cd.labels,
          datasets: [
            {label:'Gelir', data:cd.inc, backgroundColor:'rgba(16,185,129,0.65)', borderRadius:6},
            {label:'Gider', data:cd.exp, backgroundColor:'rgba(239,68,68,0.65)',  borderRadius:6},
            {label:'Maaş',  data:cd.wag, backgroundColor:'rgba(139,92,246,0.65)', borderRadius:6}
          ]
        },
        options: {
          responsive:true,
          plugins:{legend:{labels:{color:'rgba(255,255,255,0.7)'}}},
          scales:{
            x:{ticks:{color:'rgba(255,255,255,0.5)'},grid:{color:'rgba(255,255,255,0.05)'}},
            y:{ticks:{color:'rgba(255,255,255,0.5)'},grid:{color:'rgba(255,255,255,0.05)'}}
          }
        }
      });
    }, 150);
  }

  function msgHTML() {
    var pOpts = DB.personnel.length === 0
      ? '<option value="">Personel yok</option>'
      : DB.personnel.map(function(p) {
          var u = unreadCount('admin_from_'+p.id);
          var unread = DB.messages.filter(function(m) { return m.from === p.id && !m.read; }).length;
          return '<option value="' + p.id + '">' + p.firstName + ' ' + p.lastName + (unread>0?' ('+unread+' yeni)':'') + '</option>';
        }).join('');

    var allMsgs = DB.messages.slice().sort(function(a,b) { return a.ts - b.ts; });
    var chatHtml = allMsgs.length === 0
      ? '<div class="empty">Henüz mesaj yok</div>'
      : allMsgs.map(function(m) {
          var mine = m.from === 'admin';
          var p = DB.personnel.filter(function(x) { return x.id === (mine ? m.to : m.from); })[0];
          var name = p ? p.firstName : '?';
          return '<div class="msg ' + (mine?'mine':'theirs') + '">'
            + '<div class="msg-bubble">' + m.text + '</div>'
            + '<div class="msg-meta">' + (mine ? 'Yönetici → '+name : name) + ' · ' + new Date(m.ts).toLocaleString('tr') + '</div>'
            + '</div>';
        }).join('');

    DB.messages.forEach(function(m) { if (m.to === 'admin') m.read = true; });
    save();

    return '<h2 class="sec-title">💬 Mesajlar</h2>'
      + '<div class="panel">'
      + '<div class="chat-wrap">' + chatHtml + '</div>'
      + '<div style="margin-bottom:10px"><select id="msg-to" style="margin-bottom:0">' + pOpts + '</select></div>'
      + '<div style="display:flex;gap:8px">'
      + '<input id="admin-msg-inp" placeholder="Mesaj yazın..." style="margin-bottom:0"/>'
      + '<button class="btn-primary" id="admin-send">Gönder</button>'
      + '</div></div>';

    var chat = document.querySelector('.chat-wrap');
    if (chat) chat.scrollTop = chat.scrollHeight;

      var to = val('msg-to'), txt = val('admin-msg-inp');
      if (!to||!txt) { toast('Personel seçin ve mesaj yazın!','err'); return; }
      DB.messages.push({id:String(Date.now()), from:'admin', to:to, text:txt, ts:Date.now(), read:false});
      save(); toast('Gönderildi!'); showTab('messages');
    };
  }

    el('save-biz').onclick = function() {
      var name = val('st-name'), pwd = el('st-pwd') ? el('st-pwd').value : '', logo = val('st-logo');
      if (name) DB.settings.bizName = name;
      if (logo) DB.settings.logo = logo;
      if (pwd)  { ADMIN_PWD = pwd; try { localStorage.setItem('biz_admin_pwd', pwd); } catch(e){} }
      save(); applyTheme(); toast('Kaydedildi!');
    };
    document.querySelectorAll('.color-swatch').forEach(function(s) {
      s.onclick = function() {
        var t = THEME_PRESETS[parseInt(s.getAttribute('data-i'))];
        DB.settings.themeA = t.a; DB.settings.themeB = t.b;
        save(); applyTheme(); render();
      };
    });
    document.querySelectorAll('.dc').forEach(function(b) {
      b.onclick = function() {
        var i = parseInt(b.getAttribute('data-i'));
        DB.cats.splice(i, 1); save(); showTab('settings');
      };
    });
    var addCat = el('add-cat');
    if (addCat) addCat.onclick = function() {
      var c = val('new-cat');
      if (!c) return;
      DB.cats.push(c); save(); toast('Kategori eklendi!'); showTab('settings');
    };
  }

  // ════════════════════════════════════════════════════════
  // PDF
  // ════════════════════════════════════════════════════════
  function downloadPDF() {
    try {
      var jsPDF = window.jspdf ? window.jspdf.jsPDF : null;
      if (!jsPDF) { toast('PDF kütüphanesi yüklenmedi!','err'); return; }
      var doc = new jsPDF();
      var tm = thisMonth();
      var inc = monthIncome(tm), exp = monthExpense(tm), wag = monthWages(tm), net = inc-exp-wag;

      doc.setFontSize(18);
      doc.text((DB.settings.bizName||'BizPanel') + ' - Rapor', 14, 18);
      doc.setFontSize(11);
      doc.text('Tarih: ' + new Date().toLocaleDateString('tr'), 14, 28);

      doc.autoTable({
        startY:35,
        head:[['Metrik','Tutar']],
        body:[
          ['Bu Ay Gelir',  'TL ' + numFmt(inc)],
          ['Bu Ay Gider',  'TL ' + numFmt(exp)],
          ['Bu Ay Maas',   'TL ' + numFmt(wag)],
          ['Net Kar',      'TL ' + numFmt(net)],
          ['Personel',     DB.personnel.length + ' kisi']
        ],
        styles:{fontSize:11}
      });

      if (DB.personnel.length > 0) {
        doc.autoTable({
          startY: doc.lastAutoTable.finalY + 10,
          head:[['Ad Soyad','Ucret/sa']],
          body: DB.personnel.map(function(p) { return [p.firstName+' '+p.lastName, 'TL '+numFmt(p.rate)]; }),
          styles:{fontSize:10}
        });
      }

      doc.save('bizpanel-rapor.pdf');
      toast('PDF indirildi!');
    } catch(e) { toast('PDF hatasi: ' + e.message, 'err'); }
  }

  // ─── BAŞLAT ─────────────────────────────────────────────
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }

})();
</script>

</body>
</html>
