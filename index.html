<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title id="page-title">BizPanel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
:root{--bg:#0d0d1a;--bg2:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.09);--acc1:#f97316;--acc2:#ef4444;--nh:62px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
#app{background:var(--bg);min-height:100vh}
input,select,textarea,button{font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none}
input,select,textarea{background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.18)!important;color:#fff!important;border-radius:10px;padding:10px 14px;width:100%;outline:none;font-size:16px;display:block;margin-bottom:10px}
input:focus,select:focus,textarea:focus{border-color:rgba(249,115,22,0.6)!important}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.35)!important}
select option{background:#1e1e35;color:#fff}
textarea{resize:vertical;min-height:80px}
input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-bottom:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.4);border-radius:3px}

/* BUTTONS */
.bp{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff;border:none;padding:11px 20px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:opacity .2s;display:inline-block;min-height:44px}
.bp:active{opacity:.7}.bp:hover{opacity:.85}.bp.w{width:100%;padding:13px}
.bs{background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.14);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;min-height:38px;transition:all .2s}
.bs:hover{background:rgba(255,255,255,0.14)}
.bd{background:rgba(239,68,68,0.14);color:#ef4444;border:1px solid rgba(239,68,68,0.28);padding:6px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;min-height:32px;transition:all .2s}
.bd:hover{background:rgba(239,68,68,0.26)}
.be{background:rgba(6,182,212,0.14);color:#06b6d4;border:1px solid rgba(6,182,212,0.28);padding:6px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;min-height:32px;margin-right:5px;transition:all .2s}
.be:hover{background:rgba(6,182,212,0.26)}

/* HEADER */
.hdr{background:rgba(13,13,26,0.97);border-bottom:1px solid var(–border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:9px}
.logo-ico{width:32px;height:32px;background:linear-gradient(135deg,var(–acc1),var(–acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-txt{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(–acc1),var(–acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.hbtns{display:flex;gap:6px;align-items:center}

/* TABS */
.tabbar{display:flex;gap:2px;padding:12px 16px 0;overflow-x:auto;border-bottom:1px solid var(–border);background:var(–bg);scrollbar-width:none}
.tabbar::-webkit-scrollbar{height:0}
.tab{padding:8px 13px;border:none;cursor:pointer;font-weight:600;font-size:12px;white-space:nowrap;border-radius:8px 8px 0 0;background:transparent;color:rgba(255,255,255,0.4);font-family:‘DM Sans’,sans-serif;min-height:38px;transition:all .2s}
.tab.on{background:linear-gradient(135deg,var(–acc1),var(–acc2));color:#fff}
.tab:not(.on):hover{background:rgba(249,115,22,0.1);color:rgba(255,255,255,0.7)}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,26,0.97);border-top:1px solid var(–border);z-index:300;backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom)}
.bnav-row{display:flex;height:var(–nh);overflow-x:auto;scrollbar-width:none}
.bnav-row::-webkit-scrollbar{display:none}
.nbtn{flex:0 0 auto;min-width:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:rgba(255,255,255,0.35);font-size:10px;font-weight:600;font-family:‘DM Sans’,sans-serif;padding:5px 8px;cursor:pointer;position:relative;transition:color .15s}
.nbtn.on{color:var(–acc1)}
.nbtn-ico{font-size:19px;line-height:1}
.ndot{position:absolute;top:7px;right:calc(50% - 16px);width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #0d0d1a}

/* LAYOUT */
.wrap{padding:16px;max-width:1200px;margin:0 auto}
.panel{background:var(–bg2);border:1px solid var(–border);border-radius:15px;padding:18px;margin-bottom:16px}
.card{background:rgba(255,255,255,0.04);border-radius:13px;padding:14px 16px;border:1px solid rgba(255,255,255,0.06)}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:11px;margin-bottom:14px}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}
.tbl-wrap{border:1px solid var(–border);border-radius:13px;overflow:hidden;margin-bottom:16px}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;min-width:380px}
.tbl th{padding:10px 13px;text-align:left;font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;background:rgba(255,255,255,0.04);white-space:nowrap}
.tbl td{padding:9px 13px;border-top:1px solid rgba(255,255,255,0.05);font-size:13px;color:#e0e0e0;vertical-align:middle}
.tbl tbody tr:hover td{background:rgba(255,255,255,0.02)}
.stitle{font-size:18px;font-weight:800;margin-bottom:16px}
.sub{font-weight:700;font-size:14px;margin-bottom:10px}
.empty{padding:28px;text-align:center;color:rgba(255,255,255,0.28);font-size:13px}
.badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(249,115,22,0.14);color:#f97316}
.udot{width:7px;height:7px;background:#ef4444;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle}
.cup{color:#10b981;font-size:13px;font-weight:700}
.cdn{color:#ef4444;font-size:13px;font-weight:700}
.ceq{color:rgba(255,255,255,0.38);font-size:13px;font-weight:700}
.sw{width:34px;height:34px;border-radius:9px;cursor:pointer;display:inline-block;transition:transform .18s}
.sw:hover{transform:scale(1.14)}
.prog{background:rgba(255,255,255,0.07);border-radius:5px;height:7px;overflow:hidden}
.prog-f{height:7px;border-radius:5px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:#181828;border:1px solid rgba(255,255,255,0.11);border-radius:18px 18px 0 0;padding:22px 18px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mhead h3{font-size:15px;font-weight:700}
.mcls{background:rgba(255,255,255,0.09);border:none;color:#fff;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:14px}

/* TOAST */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:9999;padding:11px 20px;border-radius:11px;font-weight:600;font-size:13px;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,0.5);pointer-events:none;white-space:nowrap;animation:tin .25s ease}
@keyframes tin{from{transform:translateX(-50%) translateY(-12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fin{animation:fin .25s ease}

/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,0.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(239,68,68,0.07) 0%,transparent 50%)}
.lb{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:38px 28px;width:100%;max-width:370px}

/* CHAT */
.chat{display:flex;flex-direction:column;gap:9px;max-height:320px;overflow-y:auto;padding:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.msg{display:flex;flex-direction:column;max-width:82%}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.them{align-self:flex-start;align-items:flex-start}
.mbub{padding:9px 13px;border-radius:13px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.me .mbub{background:linear-gradient(135deg,rgba(249,115,22,0.38),rgba(239,68,68,0.38));border:1px solid rgba(249,115,22,0.28)}
.msg.them .mbub{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.09);color:#ddd}
.mmeta{font-size:10px;color:rgba(255,255,255,0.28);margin-top:3px;padding:0 3px}

/* DUYURU */
.ann{background:rgba(255,255,255,0.04);border-radius:13px;padding:15px;margin-bottom:10px;border-left:3px solid var(–acc1)}
.ann-pin{background:rgba(249,115,22,0.14);color:#f97316;border:1px solid rgba(249,115,22,0.28);border-radius:5px;font-size:10px;font-weight:700;padding:2px 7px;display:inline-block;margin-bottom:5px}
.ann-new{background:rgba(239,68,68,0.14);color:#ef4444;border:1px solid rgba(239,68,68,0.28);border-radius:5px;font-size:10px;font-weight:700;padding:2px 7px;display:inline-block;margin-left:4px}

/* RESPONSIVE */
@media(min-width:600px){.mbg{align-items:center;padding:20px}.mbox{border-radius:18px}.toast{top:20px}}
@media(min-width:768px){.wrap{padding:20px 24px}input,select,textarea{font-size:14px}.tbl{min-width:unset}}
@media(max-width:767px){
.tabbar{display:none}.bnav{display:block}
.wrap{padding:12px;padding-bottom:calc(var(–nh) + 12px + env(safe-area-inset-bottom))}
.stitle{font-size:16px;margin-bottom:12px}
.g4{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(2,1fr)}
.card{padding:11px 12px}
.panel{padding:13px}
}
@media(max-width:360px){.g3,.g4{grid-template-columns:1fr}}
</style>

</head>
<body>
<div id="app">Yükleniyor...</div>
<script>
(function(){
"use strict";

/* ── SABITLER ─────────────────────────────────────── */
var AU=‘admin’;
var THEMES=[
{n:‘Turuncu’,a:’#f97316’,b:’#ef4444’},
{n:‘Mavi’,   a:’#3b82f6’,b:’#06b6d4’},
{n:‘Yesil’,  a:’#10b981’,b:’#059669’},
{n:‘Mor’,    a:’#8b5cf6’,b:’#ec4899’},
{n:‘Altin’,  a:’#f59e0b’,b:’#f97316’}
];
var ATABS=[
{k:‘dashboard’,i:‘🏠’,l:‘Dash’},
{k:‘personnel’,i:‘👥’,l:‘Pers’},
{k:‘timesheet’,i:‘📋’,l:‘Puan’},
{k:‘income’,   i:‘💰’,l:‘Gelir’},
{k:‘expenses’, i:‘📉’,l:‘Gider’},
{k:‘summary’,  i:‘📊’,l:‘Özet’},
{k:‘messages’, i:‘💬’,l:‘Mesaj’},
{k:‘announce’, i:‘📢’,l:‘Duyuru’},
{k:‘settings’, i:‘⚙️’,l:‘Ayar’}
];

/* ── STATE ────────────────────────────────────────── */
var AUTH=null, TAB=‘dashboard’;
var APWD=‘admin123’, DB={};
try{APWD=localStorage.getItem(‘biz_apwd’)||‘admin123’;}catch(e){}

function freshDB(){
return{
personnel:[],timesheet:[],income:[],expenses:[],
cats:[‘Kira’,‘Fatura’,‘Malzeme’,‘Personel’,‘Diger’],
messages:[],announcements:[],
settings:{bizName:‘BizPanel’,themeA:’#f97316’,themeB:’#ef4444’,logo:‘⚡’}
};
}
function initDB(){
try{
var r=localStorage.getItem(‘biz4’);
if(!r)return freshDB();
var d=JSON.parse(r),f=freshDB();
d.settings=Object.assign({},f.settings,d.settings||{});
if(!d.announcements)d.announcements=[];
if(!d.cats)d.cats=f.cats;
return Object.assign({},f,d);
}catch(e){return freshDB();}
}
function save(){try{localStorage.setItem(‘biz4’,JSON.stringify(DB));}catch(e){}}
DB=initDB();

/* ── UTILS ────────────────────────────────────────── */
function el(id){return document.getElementById(id);}
function val(id){var e=el(id);return e?e.value.trim():’’;}
function nf(n){return Number(n||0).toLocaleString(‘tr’);}
function tm(){return new Date().toISOString().slice(0,7);}
function lm(){var d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}

function applyTheme(){
var a=DB.settings.themeA||’#f97316’,b=DB.settings.themeB||’#ef4444’;
document.documentElement.style.setProperty(’–acc1’,a);
document.documentElement.style.setProperty(’–acc2’,b);
var pt=el(‘page-title’);if(pt)pt.textContent=DB.settings.bizName||‘BizPanel’;
}

function toast(msg,type){
var d=document.createElement(‘div’);d.className=‘toast’;
d.style.background=type===‘err’?‘linear-gradient(135deg,#ef4444,#dc2626)’:‘linear-gradient(135deg,#10b981,#059669)’;
d.textContent=(type===‘err’?’✗ ’:’✓ ’)+msg;
document.body.appendChild(d);
setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},3000);
}

function openModal(html,bindFn){
closeModal();
var bg=document.createElement(‘div’);bg.className=‘mbg’;bg.id=‘MOD’;
bg.innerHTML=’<div class="mbox">’+html+’</div>’;
bg.addEventListener(‘click’,function(e){if(e.target===bg)closeModal();});
document.body.appendChild(bg);
if(bindFn)bindFn();
}
function closeModal(){var m=el(‘MOD’);if(m)m.parentNode.removeChild(m);}

function confirmDel(msg,cb){
openModal(
‘<div class="mhead"><h3>Silme Onayı</h3><button class="mcls" id="mcc">✕</button></div>’
+’<p style="color:rgba(255,255,255,.65);font-size:14px;line-height:1.5;margin-bottom:20px">’+msg+’</p>’
+’<div style="display:flex;gap:10px">’
+’<button class="bd" id="cyes" style="flex:1;padding:11px;font-size:14px">Evet, Sil</button>’
+’<button class="bs" id="cno" style="flex:1;padding:11px">İptal</button>’
+’</div>’,
function(){
el(‘mcc’).onclick=closeModal;
el(‘cno’).onclick=closeModal;
el(‘cyes’).onclick=function(){closeModal();cb();};
}
);
}

function mInc(m){return DB.income.reduce(function(s,i){return(i.date&&i.date.indexOf(m)===0)?s+Number(i.cash||0)+Number(i.card||0):s;},0);}
function mExp(m){return DB.expenses.reduce(function(s,e){return(e.date&&e.date.indexOf(m)===0)?s+Number(e.amount||0):s;},0);}
function mWag(m){return DB.timesheet.reduce(function(s,t){if(!t.date||t.date.indexOf(m)!==0)return s;var p=DB.personnel.filter(function(x){return x.id===t.pid;})[0];return s+(p?Number(t.hours)*Number(p.rate):0);},0);}
function pct(a,b){if(b===0)return a>0?100:0;return Math.round((a-b)/b*100);}
function cbadge(c,p){var x=pct(c,p);if(x>0)return’<span class="cup">▲ %’+x+’</span>’;if(x<0)return’<span class="cdn">▼ %’+Math.abs(x)+’</span>’;return’<span class="ceq">— %0</span>’;}
function unread(uid){return DB.messages.filter(function(m){return m.to===uid&&!m.read;}).length;}
function unreadAnn(pid){return DB.announcements.filter(function(a){return!a.readBy||a.readBy.indexOf(pid)===-1;}).length;}

function statCard(ico,lbl,val,col){
return’<div class="card" style="border-color:'+col+'2e">’
+’<div style="font-size:19px;margin-bottom:6px">’+ico+’</div>’
+’<div style="color:'+col+';font-size:17px;font-weight:800;line-height:1.2">’+val+’</div>’
+’<div style="color:rgba(255,255,255,.42);font-size:11px;margin-top:4px">’+lbl+’</div>’
+’</div>’;
}

/* ── RENDER ───────────────────────────────────────── */
function render(){
applyTheme();
var app=el(‘app’);if(!app)return;
if(!AUTH){app.innerHTML=loginHTML();bindLogin();return;}
if(AUTH.role===‘staff’){app.innerHTML=staffHTML();bindStaff();return;}
app.innerHTML=shellHTML();bindShell();showTab(TAB);
}

/* ══════════════════════════════════════════
LOGIN
══════════════════════════════════════════ */
function loginHTML(){
var n=DB.settings.bizName||‘BizPanel’;
var a=DB.settings.themeA,b=DB.settings.themeB,ico=DB.settings.logo||‘⚡’;
return’<div class="lw"><div class="lb">’
+’<div style="text-align:center;margin-bottom:26px">’
+’<div style="width:54px;height:54px;background:linear-gradient(135deg,'+a+','+b+');border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:25px;margin:0 auto 12px">’+ico+’</div>’
+’<div style="font-size:21px;font-weight:800;background:linear-gradient(135deg,'+a+','+b+');-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">’+n+’</div>’
+’<p style="color:rgba(255,255,255,.35);font-size:12px;margin-top:5px">İşletme Yönetim Sistemi</p>’
+’</div>’
+’<input id="lu" placeholder="Kullanıcı Adı" autocomplete="username" autocapitalize="none"/>’
+’<input id="lp" type="password" placeholder="Şifre" autocomplete="current-password"/>’
+’<p id="le" style="color:#ef4444;font-size:12px;text-align:center;min-height:16px;margin-bottom:10px"></p>’
+’<button class="bp w" id="lgbtn">Giriş Yap →</button>’
+’</div></div>’;
}
function bindLogin(){
function go(){
var u=val(‘lu’),p=el(‘lp’)?el(‘lp’).value:’’;
if(u===AU&&p===APWD){AUTH={role:‘admin’};render();return;}
var f=null;
for(var i=0;i<DB.personnel.length;i++){if(DB.personnel[i].username===u&&DB.personnel[i].password===p){f=DB.personnel[i];break;}}
if(f){AUTH={role:‘staff’,id:f.id};render();return;}
var le=el(‘le’);if(le)le.textContent=‘Kullanıcı adı veya şifre hatalı!’;
}
var b=el(‘lgbtn’);if(b)b.onclick=go;
var lp=el(‘lp’);if(lp)lp.onkeydown=function(e){if(e.key===‘Enter’)go();};
}

/* ══════════════════════════════════════════
STAFF
══════════════════════════════════════════ */
function staffHTML(){
var p=null;
for(var i=0;i<DB.personnel.length;i++){if(DB.personnel[i].id===AUTH.id){p=DB.personnel[i];break;}}
if(!p)return’<div style="padding:60px;text-align:center">Personel bulunamadı.</div>’;
var sh=DB.timesheet.filter(function(t){return t.pid===p.id;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
var tH=sh.reduce(function(s,t){return s+Number(t.hours);},0);
var ur=unread(p.id),ua=unreadAnn(p.id);
var vrows=sh.length===0?’<tr><td colspan="3" class="empty">Kayıt yok</td></tr>’
:sh.map(function(s){return’<tr><td>’+s.date+’</td><td style="color:#06b6d4;font-weight:700">’+s.hours+’ sa</td><td style="color:#10b981;font-weight:700">₺’+nf(Number(s.hours)*Number(p.rate))+’</td></tr>’;}).join(’’);
var myMsgs=DB.messages.filter(function(m){return m.to===p.id||m.from===p.id;}).sort(function(a,b){return a.ts-b.ts;});
var chatHtml=myMsgs.length===0?’<div class="empty">Mesaj yok</div>’
:myMsgs.map(function(m){var mine=m.from===p.id;return’<div class="msg '+(mine?'me':'them')+'"><div class="mbub">’+m.text+’</div><div class="mmeta">’+(mine?‘Siz’:‘Yönetici’)+’ · ‘+new Date(m.ts).toLocaleString(‘tr’)+’</div></div>’;}).join(’’);
var sortedAnn=DB.announcements.slice().sort(function(a,b){if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;return b.ts-a.ts;});
var annHtml=sortedAnn.length===0?’<div class="empty">Duyuru yok</div>’
:sortedAnn.map(function(a){
var isNew=!a.readBy||a.readBy.indexOf(p.id)===-1;
return’<div class="ann" style="border-left-color:'+(isNew?'var(--acc1)':'rgba(255,255,255,.1)') +'">’

],styles:{fontSize:11}});

doc.autoTable({startY:doc.lastAutoTable.finalY+10,
head:[[‘Ad Soyad’,‘Ucret/sa’,‘Toplam Saat’,‘Toplam Kazanc’]],
body:DB.personnel.map(function(p){
var aH=DB.timesheet.filter(function(x){return x.pid===p.id;}).reduce(function(s,x){return s+Number(x.hours);},0);
return[p.firstName+’ ’+p.lastName,‘TL ‘+nf(p.rate),aH+’ sa’,’TL ’+nf(aH*Number(p.rate))];
}),styles:{fontSize:10}});
}
doc.save(‘bizpanel-rapor.pdf’);toast(‘PDF indirildi!’);
}catch(e){toast(’PDF hatasi: ’+e.message,‘err’);}
}
